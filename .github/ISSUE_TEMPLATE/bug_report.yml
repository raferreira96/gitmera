name: Bug report
description: Report unexpected or incorrect behavior in gitmera
title: "fix: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: gitmera version
      description: Output of `gitmera --version` (or commit/branch, if built locally)
    validations:
      required: true

  - type: input
    id: command
    attributes:
      label: Command executed
      description: E.g. `gitmera pull --concurrency 10`
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Relevant .gitmera.yaml
      description: Paste the relevant part of your workspace file (remove sensitive data)
      render: yaml
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Output / logs
      description: Terminal output, including stack trace or error messages
      render: shell
    validations:
      required: false

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - macOS
        - Windows
        - Other
    validations:
      required: true
