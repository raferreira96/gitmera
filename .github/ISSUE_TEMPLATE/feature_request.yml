name: Feature request
description: Suggest a new feature or improvement for gitmera
title: "feat: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the scenario or current limitation motivating this request
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How do you imagine this would work (e.g. new flag, new command, behavior change)
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other ways to solve the same problem, if any
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Usage examples, links, screenshots, etc.
    validations:
      required: false
