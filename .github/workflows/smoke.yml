name: Smoke Tests

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  smoke:
    name: Gitmera smoke tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run smoke tests
        run: ./scripts/smoke-init-multi.sh
