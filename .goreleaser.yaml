version: 2

project_name: gitmera

builds:
  - id: gitmera
    main: .
    binary: gitmera
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X gitmera/cmd.version={{.Version}}

archives:
  - id: gitmera
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  groups:
    - title: "Breaking Changes"
      regexp: '^.*?[a-z]+(\([\w.-]+\))?!:.*$'
      order: 0
    - title: "Features"
      regexp: '^.*?feat(\([\w.-]+\))?:.*$'
      order: 1
    - title: "Bug Fixes"
      regexp: '^.*?fix(\([\w.-]+\))?:.*$'
      order: 2
    - title: Others
      order: 999
  filters:
    exclude:
      - '^docs'
      - '^test'
      - '^ci'
      - '^chore'
      - '^style'
      - '^refactor'
      - '^build'

release:
  github:
    owner: raferreira96
    name: gitmera
